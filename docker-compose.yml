services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://faq_user:faq_pass@postgres:5432/faq_bot
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=change-this-secret-key-in-production
      - LLM_PROVIDER=openrouter
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_GEN_MODEL=${OPENROUTER_GEN_MODEL:-deepseek/deepseek-v4-flash}
      # OLLAMA_URL нужен для ЭМБЕДДИНГОВ (bge-m3), даже когда генератор в OpenRouter —
      # _build_embedder читает settings.OLLAMA_URL; без него дефолт localhost:11434 (не тот хост в контейнере).
      - OLLAMA_URL=http://ollama:11434
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_MODEL=bge-m3
      - SIMILARITY_THRESHOLD=0.5
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://host.docker.internal:3001
      - LANGFUSE_TRACING_ENVIRONMENT=production
      - TELEGRAM_BOT_USER_EMAIL=${TELEGRAM_BOT_EMAIL:-bot@example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
      - uploads:/app/uploads

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  telegram-bot:
    build: ./bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - BACKEND_URL=http://backend:8000
      - TELEGRAM_BOT_EMAIL=${TELEGRAM_BOT_EMAIL:-bot@example.com}
      - TELEGRAM_BOT_PASSWORD=${TELEGRAM_BOT_PASSWORD:-}
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=faq_user
      - POSTGRES_PASSWORD=faq_pass
      - POSTGRES_DB=faq_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faq_user -d faq_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  uploads:
